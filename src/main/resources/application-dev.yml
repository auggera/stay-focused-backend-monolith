spring:
  datasource:
    driverClassName: org.h2.Driver
    url: ${SF_MONO_DEV_DATASOURCE_URL:jdbc:h2:mem:stayfocused};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: ${SF_MONO_DEV_DATASOURCE_USERNAME:sa}
    password: ${SF_MONO_DEV_DATASOURCE_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: create-drop

  h2:
    console:
      enabled: true
      path: /h2-console

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    org:
      springframework: INFO
    one:
      stayfocused:
        backend: DEBUG