spring:
  datasource:
    driverClassName: org.h2.Driver
    url: ${SF_MONO_DEV_DATASOURCE_URL:jdbc:h2:mem:stayfocused}
    username: ${SF_MONO_DEV_DATASOURCE_USERNAME:sa}
    password: ${SF_MONO_DEV_DATASOURCE_PASSWORD:}

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update

  h2:
    console:
      enabled: true
      path: /h2-console

logging:
  level:
    org:
      springframework: INFO
    one:
      stayfocused:
        backend: DEBUG

server:
  port: 8077