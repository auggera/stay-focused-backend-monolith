spring:
  datasource:
    url: ${SF_MONO_PROD_DATASOURCE_URL}
    username: ${SF_MONO_PROD_DATASOURCE_USERNAME}
    password: ${SF_MONO_PROD_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none

  h2:
    console:
      enabled: false

  data:
    redis:
      url: ${UPSTASH_REDIS_REST_URL}
      username: default
      password: ${UPSTASH_REDIS_REST_TOKEN}

logging:
  level:
    org:
      springframework: INFO
    one:
      stayfocused:
        backend: INFO