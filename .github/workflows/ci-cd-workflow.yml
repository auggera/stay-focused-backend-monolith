name: Build and Test

on:
  push:
    branches: [ feature/*, main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    env:
      SF_MONO_CLOUDINARY_CLOUD_NAME: ${{ secrets.SF_MONO_CLOUDINARY_CLOUD_NAME }}
      SF_MONO_CLOUDINARY_API_KEY: ${{ secrets.SF_MONO_CLOUDINARY_API_KEY }}
      SF_MONO_CLOUDINARY_API_SECRET: ${{ secrets.SF_MONO_CLOUDINARY_API_SECRET }}

      SF_MONO_TEST_DATASOURCE_URL: ${{ secrets.SF_MONO_TEST_DATASOURCE_URL }}
      SF_MONO_TEST_DATASOURCE_USERNAME: ${{ secrets.SF_MONO_TEST_DATASOURCE_USERNAME }}
      SF_MONO_TEST_DATASOURCE_PASSWORD: ${{ secrets.SF_MONO_TEST_DATASOURCE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Run tests with dev profile
        run: mvn test -Dspring.profiles.active=dev

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deploy to Render (main branch only)
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $RENDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys