name: Build and Test

on:
  push:
    branches: [ main, develop, feature/**, hotfix/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: ${{ secrets.SF_MONO_TEST_DATABASE_NAME }}
          POSTGRES_USER: ${{ secrets.SF_MONO_TEST_DATASOURCE_USERNAME }}
          POSTGRES_PASSWORD: ${{ secrets.SF_MONO_TEST_DATASOURCE_PASSWORD }}
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Select profile
        id: profile
        run: |
          if [[ "${GITHUB_REF##*/}" == "develop" ]]; then
          echo "profile=test" >> $GITHUB_OUTPUT
          else
          echo "profile=dev" >> $GITHUB_OUTPUT
          fi

      - name: Run tests
        run: mvn test -Dspring.profiles.active=${{ steps.profile.outputs.profile }}
      

      - name: Build with Maven
        run: mvn clean package -DskipTests

      - name: Deploy to Render (main branch only)
        if: github.ref == 'refs/heads/main'
        env:
          RENDER_TOKEN: ${{ secrets.RENDER_TOKEN }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_SERVICE_ID }}
        run: |
          curl -X POST \
            -H "Authorization: Bearer $RENDER_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": true}' \
            https://api.render.com/v1/services/$RENDER_SERVICE_ID/deploys

    env:
      SF_MONO_CLOUDINARY_CLOUD_NAME: ${{ secrets.SF_MONO_CLOUDINARY_CLOUD_NAME }}
      SF_MONO_CLOUDINARY_API_KEY: ${{ secrets.SF_MONO_CLOUDINARY_API_KEY }}
      SF_MONO_CLOUDINARY_API_SECRET: ${{ secrets.SF_MONO_CLOUDINARY_API_SECRET }}

      SF_MONO_TEST_DATABASE_NAME: ${{ secrets.SF_MONO_TEST_DATABASE_NAME }}
      SF_MONO_TEST_DATASOURCE_URL: ${{ secrets.SF_MONO_TEST_DATASOURCE_URL }}
      SF_MONO_TEST_DATASOURCE_USERNAME: ${{ secrets.SF_MONO_TEST_DATASOURCE_USERNAME }}
      SF_MONO_TEST_DATASOURCE_PASSWORD: ${{ secrets.SF_MONO_TEST_DATASOURCE_PASSWORD }}