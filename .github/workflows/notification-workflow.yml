name: PR Notifications

on:
  pull_request:
    types: [ opened, edited, reopened, closed ]
    branches:
      - main
      - develop

jobs:
  send_pr_notifications:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Notify Discord - Pull Request Opened
        if: ${{ github.event.action == 'opened' }}
        run: |
          SERVICE="Stay Focused Backend"
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "📋 New Pull Request Opened",
                   "description": "**Service:** '"${SERVICE}"'\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** @${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n[View Pull Request](${{ github.event.pull_request.html_url }})",
                   "color": 3447003
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL_PR }}

      - name: Notify Discord - Pull Request Updated
        if: ${{ github.event.action == 'edited' }}
        run: |
          SERVICE="Stay Focused Backend"
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "✏️ Pull Request Updated",
                   "description": "**Service:** '"${SERVICE}"'\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** @${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n[View Pull Request](${{ github.event.pull_request.html_url }})",
                   "color": 16776960
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL_PR }}

      - name: Notify Discord - Pull Request Closed
        if: ${{ github.event.action == 'closed' && !github.event.pull_request.merged }}
        run: |
          SERVICE="Stay Focused Backend"
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "❌ Pull Request Closed",
                   "description": "**Service:** '"${SERVICE}"'\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** @${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n[View Pull Request](${{ github.event.pull_request.html_url }})",
                   "color": 15158332
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL_PR }}

      - name: Notify Discord - Pull Request Merged
        if: ${{ github.event.action == 'closed' && github.event.pull_request.merged }}
        run: |
          SERVICE="Stay Focused Backend"
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "✅ Pull Request Merged",
                   "description": "**Service:** '"${SERVICE}"'\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** @${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n[View Pull Request](${{ github.event.pull_request.html_url }})",
                   "color": 3066993
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL_PR }}

      - name: Notify Discord - Pull Request Reopened
        if: ${{ github.event.action == 'reopened' }}
        run: |
          SERVICE="Stay Focused Backend"
          curl -H "Content-Type: application/json" \
               -d '{
                 "embeds": [{
                   "title": "🔄 Pull Request Reopened",
                   "description": "**Service:** '"${SERVICE}"'\n**Title:** ${{ github.event.pull_request.title }}\n**Author:** @${{ github.event.pull_request.user.login }}\n**Branch:** ${{ github.event.pull_request.head.ref }} → ${{ github.event.pull_request.base.ref }}\n[View Pull Request](${{ github.event.pull_request.html_url }})",
                   "color": 16776960
                 }]
               }' \
               ${{ secrets.DISCORD_WEBHOOK_URL_PR }}